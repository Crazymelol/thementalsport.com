name: YouTube Hero / Long-form Uploader

on:
  schedule:
    # Sundays 17:00 UTC — matches the "1 long-form per week" relaunch plan.
    - cron: '0 17 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: youtube-hero-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install poster dependencies
        working-directory: scripts/ci
        run: npm install

      - name: Upload next hero video
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: node scripts/ci/post-hero-video.mjs

      - name: Commit updated queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/youtube-hero-queue/queue.json
          git diff --staged --quiet || git commit -m "bot: mark hero video as posted"
          git pull --rebase origin master
          git push
