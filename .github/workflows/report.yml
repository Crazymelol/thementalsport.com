name: Social Report

# Compiles each agent's progress + the latest posts' stats into STATUS.md.
# Runs twice a day and on demand. Staggered from the poster crons.

on:
  schedule:
    - cron: '0 7,19 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: social-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install report dependencies
        working-directory: scripts/ci
        run: npm install

      - name: Install browser dependencies
        run: npx --yes playwright install-deps chromium

      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install

      - name: Build report
        env:
          # A YouTube Data API key (read-only, public stats). Create one at
          # console.cloud.google.com → Credentials → API key.
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          # Same Cookie-Editor exports the posters use — read-only profile
          # views for engagement stats (views/likes/comments per post).
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
          TIKTOK_COOKIES_JSON: ${{ secrets.TIKTOK_COOKIES_JSON }}
          PINTEREST_COOKIES_JSON: ${{ secrets.PINTEREST_COOKIES_JSON }}
        run: node scripts/ci/social-report.mjs

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp STATUS.md /tmp/STATUS.md
          git checkout -- STATUS.md
          # Other poster workflows push to master concurrently, and this is a
          # shallow checkout (no common ancestor for rebase, which produced
          # spurious add/add conflicts). Instead of rebasing, restart from
          # origin/master's current tip each retry so the push is always a
          # fast-forward.
          for i in 1 2 3 4 5; do
            git fetch origin master
            git checkout -B report-update origin/master
            cp /tmp/STATUS.md STATUS.md
            git add STATUS.md
            if git diff --staged --quiet; then
              echo "No changes to STATUS.md"
              exit 0
            fi
            git commit -m "bot: update social report"
            if git push origin HEAD:master; then
              exit 0
            fi
          done
          echo "Failed to push after retries"
          exit 1
