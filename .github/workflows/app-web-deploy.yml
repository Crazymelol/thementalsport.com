name: Training App Web Deploy

# Builds the Expo web export of app/ and publishes it to the gh-pages branch:
# https://crazymelol.github.io/thementalsport.com/
# Branch-based Pages is used (not actions/deploy-pages) because the default
# workflow token can't auto-enable a Pages site; pushing gh-pages can.
# peaceiris adds .nojekyll by default — required, since the export's assets
# live under _expo/ and Jekyll drops underscore-prefixed paths.

on:
  push:
    branches: [master]
    paths: ['app/**', '.github/workflows/app-web-deploy.yml']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: app-web-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Export web build
        working-directory: app
        run: npx expo export --platform web

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: app/dist
