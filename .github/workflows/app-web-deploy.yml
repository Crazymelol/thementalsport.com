name: Training App Web Deploy

# Builds the Expo web export of app/ and publishes it to GitHub Pages:
# https://crazymelol.github.io/thementalsport.com/
# The live-domain path (thementalsport.com/app) is a Shopify URL redirect
# pointing at that Pages URL.

on:
  push:
    branches: [master]
    paths: ['app/**', '.github/workflows/app-web-deploy.yml']
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: app-web-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Export web build
        working-directory: app
        run: npx expo export --platform web

      # enablement:true auto-enables Pages (source: GitHub Actions) on first
      # run when the token allows it; if this step fails, enable it once by
      # hand: repo Settings -> Pages -> Source: GitHub Actions, then re-run.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
