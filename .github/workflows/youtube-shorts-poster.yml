name: YouTube Shorts Auto-Poster

on:
  schedule:
    # 3x/day matches the cadence cap in social/youtube-queue/queue.json
    - cron: '0 8,16,23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: youtube-shorts-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install

      - name: Install poster dependencies
        working-directory: scripts/ci
        run: npm install

      - name: Install browser dependencies for Remotion render
        run: npx --yes playwright install-deps chromium

      - name: Render + upload next Short
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: node scripts/ci/post-youtube-short.mjs

      - name: Commit updated queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/youtube-queue/queue.json
          git diff --staged --quiet || git commit -m "bot: mark YouTube Short as posted"
          git pull --rebase origin master
          git push
