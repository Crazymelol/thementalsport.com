name: TikTok Auto-Poster

on:
  # Schedule disabled: TikTok guards the final "Post"/publish action against
  # automation (auth + upload + caption all work, but the publish click is
  # ignored). Left as manual-only to avoid daily failed runs and draft clutter
  # until a working path (official Content Posting API, audited) exists.
  # schedule:
  #   - cron: '0 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tiktok-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install

      - name: Install poster dependencies
        working-directory: scripts/ci
        run: npm install

      - name: Install browser dependencies for Remotion render
        run: npx --yes playwright install-deps chromium

      - name: Set up TiktokAutoUploader
        run: |
          git clone --depth 1 https://github.com/makiisthenes/TiktokAutoUploader.git "$HOME/TiktokAutoUploader"
          cd "$HOME/TiktokAutoUploader"
          pip install -r requirements.txt
          # The signature module is a Node app + a headless browser used only
          # to sign the upload API requests (not to click the UI).
          (cd tiktok_uploader/tiktok-signature && npm install && npx playwright install --with-deps chromium)

      - name: Render + post next item to TikTok
        env:
          TIKTOK_COOKIES_JSON: ${{ secrets.TIKTOK_COOKIES_JSON }}
        run: node scripts/ci/post-tiktok-update.mjs

      - name: Commit updated queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/youtube-queue/queue.json
          git diff --staged --quiet || git commit -m "bot: mark TikTok post as posted"
          git pull --rebase origin master
          git push
